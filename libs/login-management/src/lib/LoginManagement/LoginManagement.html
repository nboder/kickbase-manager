<div class="login__container">
  <mat-form-field>
    <mat-label>E-Mail</mat-label>
    <input type="email" matInput [(ngModel)]="username" />
  </mat-form-field>

  <mat-form-field>
    <mat-label>Password</mat-label>
    <input matInput type="password" [(ngModel)]="password" />
  </mat-form-field>

  <div class="login__container__save_username">
    <mat-checkbox [(ngModel)]="saveUserName">Remember Username</mat-checkbox>
  </div>

  <button matButton="filled" (click)="loginUser()">Login</button>
</div>
