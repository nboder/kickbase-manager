<div>
  @for (manager of squadPerManager() | keyvalue; track manager.key) {
  <div>{{ manager.key }}</div>
  <div>
    Average Points in Squad: {{ averagePointsForSquadForManager(manager.key) }}
  </div>
  <div>
    Average Points on Bench: {{ averagePointsForBenchForManager(manager.key) }}
  </div>
  }
</div>
