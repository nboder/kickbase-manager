<mat-card
  appearance="outlined"
  class="squad_play_card"
  [class.squad_play_card__inSquad]="isInSquad()"
  [class.squad_play_card__isBeingSold]="isBeingSold()"
  (click)="playerShouldBeSold.emit(!isBeingSold())"
>
  <div class="squad_play_card__content">
    <div class="squad_play_card__content__meta_information">
      <lib-position-marker [position]="position()"></lib-position-marker>
      <div class="squad_play_card__content__meta_information_listing">
        #{{ numberOfPlayer() }} @if (isInSquad()) { -
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="24px"
          viewBox="0 -960 960 960"
          width="24px"
        >
          <path
            d="M240-350q-20 0-35-15t-15-35q0-21 15-35.5t35-14.5q21 0 35.5 14.5T290-400q0 20-14.5 35T240-350Zm0-320q-20 0-35-15t-15-35q0-21 15-35.5t35-14.5q21 0 35.5 14.5T290-720q0 20-14.5 35T240-670Zm120 480q-20 0-35-15t-15-35q0-21 15-35.5t35-14.5q21 0 35.5 14.5T410-240q0 20-14.5 35T360-190Zm0-320q-20 0-35-15t-15-35q0-21 15-35.5t35-14.5q21 0 35.5 14.5T410-560q0 20-14.5 35T360-510Zm120 160q-20 0-35-15t-15-35q0-21 15-35.5t35-14.5q21 0 35.5 14.5T530-400q0 20-14.5 35T480-350Zm0-320q-20 0-35-15t-15-35q0-21 15-35.5t35-14.5q21 0 35.5 14.5T530-720q0 20-14.5 35T480-670Zm120 480q-20 0-35-15t-15-35q0-21 15-35.5t35-14.5q21 0 35.5 14.5T650-240q0 20-14.5 35T600-190Zm0-320q-20 0-35-15t-15-35q0-21 15-35.5t35-14.5q21 0 35.5 14.5T650-560q0 20-14.5 35T600-510Zm120 160q-20 0-35-15t-15-35q0-21 15-35.5t35-14.5q21 0 35.5 14.5T770-400q0 20-14.5 35T720-350Zm0-320q-20 0-35-15t-15-35q0-21 15-35.5t35-14.5q21 0 35.5 14.5T770-720q0 20-14.5 35T720-670Z"
          />
        </svg>
        }
      </div>
    </div>
    <div class="squad_play_card__content__player_listing">
      <lib-player-name-and-value
        [playerLastName]="playerName()"
        [marketValueTrend]="marketValueTrend()"
      ></lib-player-name-and-value>
    </div>
    <div class="squad_play_card__content__sell_section">
      <div class="money-column">{{ marketValue() | moneyPipe }}</div>
      <div [ngClass]="marketValueWinOrLoss() > 0 ? 'positive' : 'negative'">
        {{ marketValueWinOrLoss() | moneyPipe }}
      </div>
    </div>
  </div>
</mat-card>
