<div class="transfer-market-section">
  <div class="transfer-market-section__player-cards">
    @for (transferMarketPlayer of shownTransferMarketPlayers(); track
    transferMarketPlayer.playerId) {
    <lib-transfer-market-card
      [transferMarketPlayer]="transferMarketPlayer"
    ></lib-transfer-market-card>
    }
  </div>
  <div class="container">
    <mat-slide-toggle
      [checked]="showOnlyPointMachines()"
      (change)="showOnlyPointMachines.set($event.checked)"
    >
      Pointing Machines
    </mat-slide-toggle>
    <mat-slide-toggle
      [checked]="showPositiveMarketValueTrends()"
      (change)="showPositiveMarketValueTrends.set($event.checked)"
    >
      MV +
    </mat-slide-toggle>
    <mat-slide-toggle
      [checked]="showGoldDiggers()"
      (change)="showGoldDiggers.set($event.checked)"
    >
      Gold digger!
    </mat-slide-toggle>
    <button matButton="tonal" (click)="acceptBuyingOrders()">
      Set Buy-Orders
    </button>
  </div>
</div>
