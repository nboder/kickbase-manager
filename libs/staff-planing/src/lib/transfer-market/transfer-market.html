<div class="transfer-market-section">
  <div class="transfer-market-section__player-cards">
    @for (transferMarketPlayer of shownTransferMarketPlayers(); track
    transferMarketPlayer.playerId) {
    <lib-transfer-market-card
      [transferMarketPlayer]="transferMarketPlayer"
      (sold)="acceptBuyingOrders()"
    ></lib-transfer-market-card>
    }
  </div>
  <div class="container">
    <mat-slide-toggle
      [checked]="showOnlyPointMachines()"
      (change)="showOnlyPointMachines.set($event.checked)"
    >
      Pointing Machines
    </mat-slide-toggle>
  </div>
</div>
