@if (selectedLeaguedId()) { @if (viewPortService.isMobileLayout()) {
<mat-tab-group
  class="mobile-tab_group"
  [selectedIndex]="controller().currentActiveViewIndex()"
  (selectedIndexChange)="controller().activeViewHasChanged($event)"
  headerPosition="below"
  mat-stretch-tabs="true"
  mat-align-tabs="start"
>
  <mat-tab label="Transfers">
    <div class="mobile-container">
      <ng-container *ngTemplateOutlet="transferMarket" />
    </div>
  </mat-tab>
  <mat-tab label="Money">
    <div class="mobile-container">
      <ng-container *ngTemplateOutlet="moneyOverview" />
    </div>
  </mat-tab>
  <mat-tab label="Squad">
    <div class="mobile-container">
      <ng-container *ngTemplateOutlet="squadView" />
    </div>
  </mat-tab>
</mat-tab-group>
} @else {
<div class="container">
  <div class="transfer-section">
    <ng-container *ngTemplateOutlet="transferMarket" />
  </div>
  <div class="money-section">
    <ng-container *ngTemplateOutlet="moneyOverview" />
  </div>
  <div class="squad-section">
    <ng-container *ngTemplateOutlet="squadView" />
  </div>
</div>
} } @else {
<div>You did something you shouldn't do - nanana</div>
}

<ng-template #transferMarket>
  <lib-transfer-market
    [selectedLeagueId]="selectedLeaguedId()"
    [showMobileLayout]="viewPortService.isMobileLayout()"
    (sumOfBuyingPlayers)="sumOfBuyingPlayer.set($event)"
  ></lib-transfer-market>
</ng-template>

<ng-template #moneyOverview>
  <lib-money-overview
    [selectedLeagueId]="selectedLeaguedId()"
    [showMobileLayout]="viewPortService.isMobileLayout()"
    [sumOfSoldPlayers]="sumOfSoldPlayers()"
    [sumOfBuyingPlayer]="sumOfBuyingPlayer()"
    [twentyFourHourPredictions]="predictions24h()"
    [twentyFourHourPredictionsOnlyBenchPlayer]="predictions24hOnlyBenchPlayer()"
    [sevenDayPredictions]="predictions7Days()"
    [sevenDayPredictionsOnlyBenchPlayer]="predictions7DaysOnlyBenchPlayer()"
  ></lib-money-overview>
</ng-template>

<ng-template #squadView>
  <lib-squad-view
    [selectedLeagueId]="selectedLeaguedId()"
    [showMobileLayout]="viewPortService.isMobileLayout()"
  >
  </lib-squad-view>
</ng-template>
