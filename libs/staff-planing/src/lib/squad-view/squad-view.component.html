@if (showMobileLayout()) {
<div class="mobile-container">
  <div class="mobile__section_squad">
    @for (player of mySquad(); track player.playerId) {
    <lib-squad-player-card
      [numberOfPlayer]="$index + 1"
      [playerId]="player.playerId"
      [playerName]="player.name"
      [marketValue]="player.marketValue"
      [marketValueTrend]="player.twentyForHoursDevelopment"
      [position]="player.position"
      [isInSquad]="player.isInSquad"
      [isBeingSold]="isPlayerMarkedForSelling(player)"
      (playerShouldBeSold)="playerToggleSellStatus(player.playerId, $event)"
    ></lib-squad-player-card>
    }
  </div>
  <div class="mobile__section-buttons">
    <button matButton="tonal" (click)="sellAllPlayersNotInSquad()">
      Sell not in Squad
    </button>
    <button matButton="tonal" (click)="resetAllSellingCandidates()">
      Reset all Sales
    </button>
  </div>
</div>
} @else {
<div class="squad-section">
  <div class="squad-section__card-section">
    @for (player of mySquad(); track player.playerId) {
    <lib-squad-player-card
      [numberOfPlayer]="$index + 1"
      [playerId]="player.playerId"
      [playerName]="player.name"
      [marketValue]="player.marketValue"
      [marketValueTrend]="player.twentyForHoursDevelopment"
      [position]="player.position"
      [isInSquad]="player.isInSquad"
      [isBeingSold]="isPlayerMarkedForSelling(player)"
      (playerShouldBeSold)="playerToggleSellStatus(player.playerId, $event)"
    ></lib-squad-player-card>
    }
  </div>
  <div class="squad-section__buttons">
    <button matButton="tonal" (click)="sellAllPlayersNotInSquad()">
      Sell not in Squad
    </button>
    <button matButton="tonal" (click)="resetAllSellingCandidates()">
      Reset all Sales
    </button>
  </div>
</div>
}
