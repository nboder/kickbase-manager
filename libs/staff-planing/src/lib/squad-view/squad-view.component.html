@if (showMobileLayout()) {
<div class="mobile-container">
  <div class="mobile__section_squad">
    @for (player of mySquad(); track player.playerId) { @if
    (shouldShowPositionSeparator($index, $first)) {
    <lib-divider
      text="{{ kickbasePositionToExtendedString(player.position) }}"
      [size]="DividerSize.LARGE"
    ></lib-divider>
    }
    <ng-template
      [ngTemplateOutlet]="squadPlayerCard"
      [ngTemplateOutletContext]="{ player: player, index: $index }"
    ></ng-template>
    }
  </div>
  <div class="mobile__section-buttons">
    <ng-template [ngTemplateOutlet]="sellAllButton"></ng-template>
    <ng-template [ngTemplateOutlet]="resetSales"></ng-template>
  </div>
</div>
} @else {
<div class="squad-section">
  <div class="squad-section__card-section">
    @for (player of mySquad(); track player.playerId) {
    <ng-template
      [ngTemplateOutlet]="squadPlayerCard"
      [ngTemplateOutletContext]="{ player: player, index: $index }"
    ></ng-template>
    }
  </div>
  <div class="squad-section__buttons">
    <ng-template [ngTemplateOutlet]="sellAllButton"></ng-template>
    <ng-template [ngTemplateOutlet]="resetSales"></ng-template>
  </div>
</div>
}

<ng-template #squadPlayerCard let-player="player" let-index="index">
  <lib-squad-player-card
    [numberOfPlayer]="index + 1"
    [playerId]="player.playerId"
    [playerName]="player.name"
    [marketValue]="player.marketValue"
    [marketValueTrend]="player.twentyForHoursDevelopment"
    [marketValueWinOrLoss]="player.marketValueWinOrLoss"
    [position]="player.position"
    [isInSquad]="player.isInSquad"
    [isBeingSold]="isPlayerMarkedForSelling(player)"
    (playerShouldBeSold)="playerToggleSellStatus(player.playerId, $event)"
  ></lib-squad-player-card>
</ng-template>

<ng-template #sellAllButton>
  <button matButton="tonal" (click)="sellAllPlayersNotInSquad()">
    Mark all Bench
  </button>
</ng-template>

<ng-template #resetSales>
  <button matButton="tonal" (click)="resetAllSellingCandidates()">
    Reset all Sales
  </button>
</ng-template>
