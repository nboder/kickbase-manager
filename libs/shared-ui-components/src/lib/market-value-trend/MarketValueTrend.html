<div class="market_value_trend">
  @switch (determineMarketValueTrend()) { @case (MarketValueTrendEnum.UP) {
  <div class="market_value_trend__up">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
      <path
        d="m136-240-56-56 296-298 160 160 208-206H640v-80h240v240h-80v-104L536-320 376-480 136-240Z"
      />
    </svg>

    {{ marketValueTrend() | moneyPipe }}
  </div>
  } @case (MarketValueTrendEnum.DOWN) {
  <div class="market_value_trend__down">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
      <path
        d="M640-240v-80h104L536-526 376-366 80-664l56-56 240 240 160-160 264 264v-104h80v240H640Z"
      />
    </svg>
    {{ marketValueTrend() | moneyPipe }}
  </div>
  } @default {
  <div class="market_value_trend__neutral">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
      <path
        d="m700-300-57-56 84-84H120v-80h607l-83-84 57-56 179 180-180 180Z"
      />
    </svg>
    {{ marketValueTrend() | moneyPipe }}
  </div>
  } }
</div>
