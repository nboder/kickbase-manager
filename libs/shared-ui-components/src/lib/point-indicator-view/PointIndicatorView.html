@switch (pointIndication()) { @case (PointIndication.GREAT) {
<div class="point-indicator-view__great"></div>
} @case (PointIndication.VERY_GOOD) {
<div class="point-indicator-view__very_good"></div>
} @case (PointIndication.GOOD) {
<div class="point-indicator-view__good"></div>
} @case (PointIndication.JUST_A_PLAYER) {
<div class="point-indicator-view__bad"></div>
} }
